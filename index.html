<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK I — Vocabulario</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --card-bg: #161619;
    --card-front: #1c1c21;
    --accent: #e8c14a;
    --accent2: #5b8ef0;
    --text: #f0ede8;
    --muted: #6b6b7a;
    --border: #2a2a35;
    --correct: #4caf7d;
    --wrong: #e05555;
    --tag-bg: #23232e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; max-width: 900px; padding: 2rem 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.2rem; }
  .title-row { display: flex; align-items: baseline; gap: 1rem; }
  h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--accent); letter-spacing: -0.02em; }
  .subtitle { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .controls { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; }
  .filter-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 0.2rem; }
  .tag { padding: 0.35rem 0.85rem; border-radius: 20px; border: 1px solid var(--border); background: var(--tag-bg); color: var(--muted); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.9rem 0.45rem 2rem; color: var(--text); font-size: 0.85rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%); font-size: 0.75rem; opacity: 0.5; }
  .mode-btns { display: flex; gap: 0.5rem; }
  .mode-btn { padding: 0.4rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 0.82rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .mode-btn:hover { color: var(--text); border-color: var(--muted); }
  .mode-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .stats-bar { width: 100%; max-width: 900px; padding: 0 1.5rem; display: flex; gap: 1.5rem; font-size: 0.8rem; color: var(--muted); }
  .stat span { color: var(--text); font-weight: 500; }

  /* FLASHCARD */
  #flashcard-mode { width: 100%; max-width: 520px; padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .progress-bar-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .card-counter { font-size: 0.8rem; color: var(--muted); align-self: flex-end; }
  .card-scene { width: 100%; height: 280px; perspective: 1000px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.4,0,.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8rem; padding: 2rem; border: 1px solid var(--border); }
  .card-front { background: var(--card-front); }
  .card-back { background: linear-gradient(135deg, #1a1a2e, #16213e); transform: rotateY(180deg); border-color: var(--accent2); }
  .korean-word { font-family: 'Noto Sans KR', sans-serif; font-size: 3.5rem; font-weight: 700; color: var(--text); line-height: 1; }
  .word-num { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .tap-hint { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; position: absolute; bottom: 1rem; }
  .translation-es { font-size: 1.6rem; font-family: 'DM Serif Display', serif; color: var(--text); text-align: center; line-height: 1.2; }
  .translation-en { font-size: 0.8rem; color: var(--muted); text-align: center; margin-top: -0.3rem; }
  .category-badge { padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.72rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-nav { display: flex; gap: 1rem; width: 100%; justify-content: center; }
  .nav-btn { flex: 1; max-width: 140px; padding: 0.75rem; border-radius: 10px; border: none; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.18s; }
  .btn-prev { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
  .btn-prev:hover { color: var(--text); }
  .btn-next { background: var(--accent); color: #000; }
  .btn-next:hover { filter: brightness(1.1); }
  .btn-shuffle { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
  .btn-shuffle:hover { color: var(--accent2); border-color: var(--accent2); }

  /* GRID */
  #grid-mode { width: 100%; max-width: 900px; padding: 1rem 1.5rem 3rem; display: none; }
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.7rem; }
  .vocab-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 0.3rem; transition: border-color 0.2s, transform 0.15s; }
  .vocab-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
  .vocab-card .korean { font-family: 'Noto Sans KR', sans-serif; font-size: 1.3rem; font-weight: 700; }
  .vocab-card .eng-es { font-size: 0.85rem; color: var(--text); line-height: 1.3; }
  .vocab-card .eng-en { font-size: 0.72rem; color: var(--muted); line-height: 1.3; }
  .vocab-card .cat { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 0.2rem; }

  /* QUIZ */
  #quiz-mode { width: 100%; max-width: 540px; padding: 1.5rem; display: none; flex-direction: column; align-items: center; gap: 1.5rem; }
  .quiz-question { font-family: 'Noto Sans KR', sans-serif; font-size: 3rem; font-weight: 700; text-align: center; color: var(--text); }
  .quiz-instruction { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; width: 100%; }
  .quiz-opt { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; gap: 0.15rem; }
  .quiz-opt:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); }
  .quiz-opt.correct { border-color: var(--correct); background: rgba(76,175,125,0.12); color: var(--correct); }
  .quiz-opt.wrong { border-color: var(--wrong); background: rgba(224,85,85,0.1); color: var(--wrong); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-opt .opt-es { font-size: 0.9rem; }
  .quiz-opt .opt-en { font-size: 0.72rem; color: var(--muted); }
  .quiz-opt.correct .opt-en, .quiz-opt.wrong .opt-en { color: inherit; opacity: 0.7; }
  .quiz-score-row { display: flex; gap: 2rem; font-size: 0.85rem; }
  .quiz-score-row .correct-count { color: var(--correct); }
  .quiz-score-row .wrong-count { color: var(--wrong); }
  .quiz-next { padding: 0.7rem 2rem; border-radius: 10px; border: none; background: var(--accent); color: #000; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: filter 0.18s; display: none; }
  .quiz-next:hover { filter: brightness(1.1); }

  .cat-verbo { background: rgba(91,142,240,0.15); color: #5b8ef0; }
  .cat-sustantivo { background: rgba(232,193,74,0.15); color: #e8c14a; }
  .cat-adjetivo { background: rgba(76,175,125,0.15); color: #4caf7d; }
  .cat-adverbio { background: rgba(200,130,200,0.15); color: #c882c8; }
  .cat-expresión { background: rgba(255,140,80,0.15); color: #ff8c50; }
  .cat-número { background: rgba(100,200,220,0.15); color: #64c8dc; }
  .cat-otro { background: rgba(150,150,160,0.15); color: #969696; }
  .empty-state { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.9rem; grid-column: 1/-1; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    header { padding: 1rem 1rem 0.6rem; gap: 0.75rem; }
    h1 { font-size: 1.5rem; }
    .subtitle { font-size: 0.72rem; }

    .controls.filters { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .controls.filters::-webkit-scrollbar { display: none; }
    .filter-label { display: none; }
    .tag { flex-shrink: 0; padding: 0.3rem 0.7rem; font-size: 0.75rem; }

    .controls.search-row { flex-direction: column; gap: 0.5rem; }
    .search-wrap { min-width: unset; width: 100%; }
    .mode-btns { width: 100%; display: flex; }
    .mode-btn { flex: 1; padding: 0.5rem 0; font-size: 0.8rem; text-align: center; min-height: 40px; }

    .stats-bar { padding: 0 1rem; font-size: 0.75rem; }

    #flashcard-mode { padding: 1rem; gap: 1rem; }
    .card-scene { height: 240px; }
    .korean-word { font-size: 2.8rem; }
    .translation-es { font-size: 1.35rem; }
    .card-nav { gap: 0.5rem; }
    .nav-btn { padding: 0.7rem 0.4rem; font-size: 0.8rem; min-height: 44px; }
    .btn-shuffle { max-width: 52px; font-size: 1rem; }
    .btn-shuffle .shuffle-label { display: none; }

    #grid-mode { padding: 0.75rem 1rem 3rem; }
    .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
    .vocab-card { padding: 0.75rem; }
    .vocab-card .korean { font-size: 1.15rem; }

    #quiz-mode { padding: 1rem; gap: 1rem; }
    .quiz-question { font-size: 3rem; }
    .quiz-options { gap: 0.5rem; }
    .quiz-opt { padding: 0.85rem 0.75rem; min-height: 60px; }
    .quiz-opt .opt-es { font-size: 0.85rem; }
    .quiz-opt .opt-en { font-size: 0.68rem; }
  }
</style>
</head>

<header>

    <h1>TOPIK I</h1>
    <span class="subtitle">Vocabulario · 1053 palabras</span>
  </div>

    <button class="tag" onclick="setCategory('adjetivo',this)">Adjetivos</button>
    <button class="tag" onclick="setCategory('adverbio',this)">Adverbios</button>
    <button class="tag" onclick="setCategory('expresión',this)">Expresiones</button>
    <button class="tag" onclick="setCategory('número',this)">Números</button>
  </div>
  <div class="controls search-row">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Buscar palabra o traducción..." oninput="handleSearch()">
    </div>
    <div class="mode-btns">
      <button class="mode-btn active" onclick="setMode('flashcard',this)">Flashcards</button>
      <button class="mode-btn" onclick="setMode('grid',this)">Lista</button>
      <button class="mode-btn" onclick="setMode('quiz',this)">Quiz</button>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">Mostrando <span id="count-display">1053</span> palabras</div>
  <div class="stat" id="quiz-stats-bar" style="display:none">✓ <span id="q-correct" style="color:var(--correct)">0</span> &nbsp;✗ <span id="q-wrong" style="color:var(--wrong)">0</span></div>
</div>

<div id="flashcard-mode">

  <div class="card-counter" id="card-counter">1 / 1053</div>

        <div class="translation-en" id="card-translation-en">(store, shop)</div>
        <div class="category-badge" id="card-category">sustantivo</div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nav-btn btn-prev" onclick="prevCard()">← Anterior</button>
    <button class="nav-btn btn-shuffle" onclick="shuffleDeck()"><span class="shuffle-label"> Mezclar</span>⇄</button>
    <button class="nav-btn btn-next" onclick="nextCard()">Siguiente →</button>
  </div>
</div>

<div id="grid-mode">
  <div class="vocab-grid" id="vocab-grid"></div>
</div>

<div id="quiz-mode">
  <div class="quiz-score-row">
    <span class="correct-count">✓ <span id="qc">0</span> correctas</span>
    <span class="wrong-count">✗ <span id="qw">0</span> incorrectas</span>
  </div>
  <div class="quiz-instruction">¿Qué significa esta palabra?</div>
  <div class="quiz-question" id="quiz-q">가게</div>
  <div class="quiz-options" id="quiz-opts"></div>

</div>

let allWords = rawData.map(([k,es,en,cat],i) => ({id:i,korean:k,es,en,cat}));
let filtered = [...allWords];
let deck = [...filtered];
let currentIdx = 0;
let currentCat = 'todas';
let currentMode = 'flashcard';
let searchTerm = '';
let quizCorrect = 0, quizWrong = 0, quizAnswered = false;
let quizWords = [], quizCurrent = 0;

function catClass(c){return 'cat-'+(c||'otro');}

function updateCard(){
  if(!deck.length)return;
  const w=deck[currentIdx];
  const inner=document.getElementById('card-inner');
  const wasFlipped=inner.classList.contains('flipped');

  // Update counter and progress bar immediately
  document.getElementById('card-counter').textContent=(currentIdx+1)+' / '+deck.length;
  document.getElementById('progress-fill').style.width=((currentIdx+1)/deck.length*100)+'%';

  if(wasFlipped){
    // Flip back first, then update content mid-animation so it's never visible
    inner.classList.remove('flipped');
    setTimeout(()=>{
      document.getElementById('card-num').textContent='#'+(w.id+1);
      document.getElementById('card-korean').textContent=w.korean;
      document.getElementById('card-translation-es').textContent=w.es;
      document.getElementById('card-translation-en').textContent='('+w.en+')';
      const cat=document.getElementById('card-category');
      cat.textContent=w.cat; cat.className='category-badge '+catClass(w.cat);
    }, 280); // halfway through the 550ms flip — back face is hidden at this point
  } else {
    // Card is already showing front, just update content directly
    document.getElementById('card-num').textContent='#'+(w.id+1);
    document.getElementById('card-korean').textContent=w.korean;
    document.getElementById('card-translation-es').textContent=w.es;
    document.getElementById('card-translation-en').textContent='('+w.en+')';
    const cat=document.getElementById('card-category');
    cat.textContent=w.cat; cat.className='category-badge '+catClass(w.cat);
  }
}

function flipCard(){document.getElementById('card-inner').classList.toggle('flipped');}
function nextCard(){if(currentIdx<deck.length-1){currentIdx++;updateCard();}}
function prevCard(){if(currentIdx>0){currentIdx--;updateCard();}}
function shuffleDeck(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  currentIdx=0;updateCard();
}

function renderGrid(){
  const grid=document.getElementById('vocab-grid');
  const words=getFiltered();
  if(!words.length){grid.innerHTML='<div class="empty-state">No se encontraron palabras.</div>';return;}
  grid.innerHTML=words.map(w=>`<div class="vocab-card">
    <div class="korean">${w.korean}</div>
    <div class="eng-es">${w.es}</div>
    <div class="eng-en">(${w.en})</div>
    <div class="cat ${catClass(w.cat)}">${w.cat}</div>
  </div>`).join('');
}

function startQuiz(){
  quizWords=getFiltered().sort(()=>Math.random()-0.5);
  quizCurrent=0;quizCorrect=0;quizWrong=0;
  updateQuizCounters();renderQuizQuestion();
}

function renderQuizQuestion(){
  if(!quizWords.length)return;
  const w=quizWords[quizCurrent%quizWords.length];
  document.getElementById('quiz-q').textContent=w.korean;
  quizAnswered=false;
  const pool=allWords.filter(x=>x.id!==w.id).sort(()=>Math.random()-0.5).slice(0,3);
  const opts=[...pool,w].sort(()=>Math.random()-0.5);
  document.getElementById('quiz-opts').innerHTML=opts.map(o=>`
    <button class="quiz-opt" onclick="checkAnswer(this,${o.id},${w.id})">
      <span class="opt-es">${o.es}</span>
      <span class="opt-en">(${o.en})</span>
    </button>`).join('');
}

function checkAnswer(btn,selectedId,correctId){
  if(quizAnswered)return;
  quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach(b=>{b.disabled=true;});
  const correctWord=allWords.find(x=>x.id===correctId);
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    if(b.querySelector('.opt-es').textContent===correctWord.es) b.classList.add('correct');
  });
  if(selectedId===correctId){quizCorrect++;}
  else{btn.classList.add('wrong');quizWrong++;}
  updateQuizCounters();
  setTimeout(()=>nextQuiz(), 900);
}

function nextQuiz(){
  quizCurrent++;
  if(quizCurrent>=quizWords.length){quizWords=getFiltered().sort(()=>Math.random()-0.5);quizCurrent=0;}
  renderQuizQuestion();
}

function updateQuizCounters(){
  document.getElementById('qc').textContent=quizCorrect;
  document.getElementById('qw').textContent=quizWrong;
  document.getElementById('q-correct').textContent=quizCorrect;
  document.getElementById('q-wrong').textContent=quizWrong;
}

function getFiltered(){
  return allWords.filter(w=>{
    const mc=currentCat==='todas'||w.cat===currentCat;
    const ms=!searchTerm||w.korean.includes(searchTerm)||w.es.toLowerCase().includes(searchTerm.toLowerCase())||w.en.toLowerCase().includes(searchTerm.toLowerCase());
    return mc&&ms;
  });
}

function setCategory(cat,el){
  currentCat=cat;
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function handleSearch(){searchTerm=document.getElementById('search').value.trim();applyFilters();}

function applyFilters(){
  filtered=getFiltered();
  document.getElementById('count-display').textContent=filtered.length;
  deck=[...filtered];currentIdx=0;
  if(currentMode==='flashcard')updateCard();
  else if(currentMode==='grid')renderGrid();
  else if(currentMode==='quiz')startQuiz();
}

function setMode(mode,el){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('flashcard-mode').style.display=mode==='flashcard'?'flex':'none';
  document.getElementById('grid-mode').style.display=mode==='grid'?'block':'none';
  document.getElementById('quiz-mode').style.display=mode==='quiz'?'flex':'none';
  document.getElementById('quiz-stats-bar').style.display=mode==='quiz'?'block':'none';
  if(mode==='grid')renderGrid();
  if(mode==='quiz')startQuiz();
  if(mode==='flashcard')updateCard();
}

document.addEventListener('keydown',e=>{
  if(currentMode==='flashcard'){
    if(e.key==='ArrowRight')nextCard();
    if(e.key==='ArrowLeft')prevCard();
    if(e.key===' '){e.preventDefault();flipCard();}
  }
});

updateCard();
